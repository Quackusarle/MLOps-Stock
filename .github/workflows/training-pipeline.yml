name: MLOps Training Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'kfp_pipeline.py'
      - 'Dockerfile.training'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-trainer 

jobs:
  build-and-run-pipeline:
    runs-on: [self-hosted, k3s, mlops]
    
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install kfp==2.* requests

      - name: Đăng nhập vào Github Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build và Push Image lên GHCR
        run: |
          LOWER_IMAGE_NAME=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" | tr '[:upper:]' '[:lower:]')
          
          docker build -t $LOWER_IMAGE_NAME -f Dockerfile.training .
          docker push $LOWER_IMAGE_NAME
          
          echo "TRAINER_IMAGE=$LOWER_IMAGE_NAME" >> $GITHUB_ENV

      - name: Compile & Submit Kubeflow Pipeline
        env:
          KFP_HOST: "http://ml-pipeline.kubeflow.svc.cluster.local:8888" 
        run: |
          python run_pipeline.py
