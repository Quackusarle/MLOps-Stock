name: "2. Model Training Pipeline"

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'kfp_pipeline.py'
      - 'run_pipeline.py'
      - 'Dockerfile.training'
      - 'requirements.txt'
  workflow_run:
    workflows: ["1. Data Ingestion & Versioning"]
    types:
      - completed
  workflow_dispatch:

env:
  IMAGE_NAME: mlops-stock-trainer

jobs:
  build-and-push:
    name: Build & Push Trainer Image
    runs-on: [self-hosted, k3s, mlops]
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx (remote BuildKit)
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: tcp://buildkitd.actions-runner-system.svc.cluster.local:1234

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          SHA_TAG="${IMAGE}:sha-$(echo ${{ github.sha }} | cut -c1-7)"
          LATEST_TAG="${IMAGE}:latest"
          echo "sha_tag=${SHA_TAG}" >> $GITHUB_OUTPUT
          echo "latest_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
          echo "Will build: ${LATEST_TAG} and ${SHA_TAG}"

      - name: Set up Python for DVC
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.15'
          cache: 'pip'

      - name: DVC Pull Data
        run: |
          pip install "dvc[s3]"
          dvc pull || echo "No DVC data to pull yet"
          mkdir -p data

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.training
          push: true
          tags: |
            ${{ steps.meta.outputs.latest_tag }}
            ${{ steps.meta.outputs.sha_tag }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/mlops-cache:trainer
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/mlops-cache:trainer,mode=min

      - name: Set trainer image env for next step
        run: echo "TRAINER_IMAGE=${{ steps.meta.outputs.latest_tag }}" >> $GITHUB_ENV

  submit-kubeflow-pipeline:
    name: Compile & Submit Kubeflow Pipeline
    runs-on: [self-hosted, k3s, mlops]
    needs: build-and-push

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11.15
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.15'
          cache: 'pip'

      - name: Install KFP dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "kfp>=2.0,<3.0" requests

      - name: Compile & Submit Kubeflow Pipeline
        env:
          KFP_HOST: "http://ml-pipeline.kubeflow.svc.cluster.local:8888"
          TRAINER_IMAGE: ${{ needs.build-and-push.outputs.image_tag }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: python run_pipeline.py
