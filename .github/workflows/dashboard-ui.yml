name: "3. Dashboard UI Pipeline"

on:
  push:
    branches:
      - main
    paths:
      - 'services/dashboard_ui/**'
      - 'requirements.txt'
  workflow_dispatch:

env:
  IMAGE_NAME: mlops-stock-dashboard

jobs:
  build-and-push:
    name: Build & Push Dashboard UI
    runs-on: [self-hosted, k3s, mlops]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx (remote BuildKit)
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: tcp://buildkitd.actions-runner-system.svc.cluster.local:1234

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tags
        id: meta
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tags=${IMAGE}:latest,${IMAGE}:sha-${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "🏷️  Tags: ${IMAGE}:latest | ${IMAGE}:sha-${SHA_SHORT}"

      - name: Build & Push Dashboard Image
        uses: docker/build-push-action@v5
        with:
          # Dashboard Dockerfile dùng COPY requirements.txt từ root nên cần build từ root
          context: .
          file: ./services/dashboard_ui/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/mlops-cache:dashboard
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/mlops-cache:dashboard,mode=min

      - name: Job Summary
        run: |
          echo "## ✅ Dashboard UI Deployed" >> $GITHUB_STEP_SUMMARY
          echo "**Images pushed to Docker Hub:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)\`" >> $GITHUB_STEP_SUMMARY
